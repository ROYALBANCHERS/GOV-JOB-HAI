<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Government Job Hai</title>
    <meta name="description" content="Read latest articles about government jobs, exam tips, career guidance, and preparation strategies on Government Job Hai blog.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">

    <!-- Firebase SDK (Free Tier - Spark Plan) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

    <!-- Google AdSense (Free - Earn from ads) -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>

    <style>
        .blog-header {
            background: linear-gradient(135deg, #004a99 0%, #0066cc 100%);
            color: white;
            padding: 3rem 0;
            text-align: center;
        }
        .blog-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .blog-header p {
            font-size: 1.125rem;
            opacity: 0.9;
        }
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            padding: 2rem 0;
        }
        .blog-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }
        .blog-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .blog-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--bg-secondary);
        }
        .blog-content {
            padding: 1.5rem;
        }
        .blog-category {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: #dbeafe;
            color: #1e40af;
            border-radius: var(--radius-md);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }
        .blog-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
            line-height: 1.4;
        }
        .blog-excerpt {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.6;
            margin-bottom: 1rem;
        }
        .blog-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        .blog-date {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .blog-read-time {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        .error {
            text-align: center;
            padding: 3rem;
            color: var(--danger-color);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>Government Job Hai</h1>
            </div>
            <div class="nav-menu">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="../category/latest_job.html" class="nav-link">Latest Jobs</a>
                <a href="index.html" class="nav-link active">Blog</a>
                <a href="../contact.html" class="nav-link">Contact</a>
            </div>
        </div>
    </nav>

    <div class="blog-header">
        <div class="container">
            <h1>Government Job Hai Blog</h1>
            <p>Exam Tips, Career Guidance, and Latest Updates</p>
        </div>
    </div>

    <main class="main-content">
        <div class="container">
            <!-- Featured Posts -->
            <div id="featuredPosts" style="margin-bottom: 3rem;">
                <h2 class="section-title">Featured Articles</h2>
                <div class="blog-grid" id="featuredPostsGrid">
                    <div class="loading">Loading featured articles...</div>
                </div>
            </div>

            <!-- Latest Articles -->
            <div>
                <h2 class="section-title">Latest Articles</h2>
                <div class="blog-grid" id="latestPostsGrid">
                    <div class="loading">Loading articles...</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Government Job Hai. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="../js/firebase-config.js"></script>
    <script src="../js/adsense-config.js"></script>
    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                // Load blogs from API
                const blogs = await api.getBlogs();

                // Separate featured and latest posts
                const featuredBlogs = blogs.filter(blog => blog.featured && blog.status === 'published');
                const latestBlogs = blogs.filter(blog => !blog.featured && blog.status === 'published');

                // Render featured posts
                renderBlogs(featuredBlogs, 'featuredPostsGrid');

                // Render latest posts
                renderBlogs(latestBlogs, 'latestPostsGrid');

                // Hide featured section if no featured posts
                if (featuredBlogs.length === 0) {
                    document.getElementById('featuredPosts').style.display = 'none';
                }
            } catch (error) {
                console.error('Failed to load blogs:', error);
                document.getElementById('featuredPostsGrid').innerHTML = '<div class="error">Failed to load blogs. Please try again later.</div>';
                document.getElementById('latestPostsGrid').innerHTML = '';
            }
        });

        function renderBlogs(blogs, containerId) {
            const container = document.getElementById(containerId);

            if (blogs.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--text-secondary);">No articles found.</div>';
                return;
            }

            container.innerHTML = blogs.map(blog => `
                <article class="blog-card" onclick="window.location.href='blog-post.html?id=${blog.id}'">
                    <img src="${escapeHtml(blog.image)}" alt="${escapeHtml(blog.title)}" class="blog-image" onerror="this.src='https://via.placeholder.com/800x400?text=Blog+Image'">
                    <div class="blog-content">
                        <span class="blog-category">${escapeHtml(blog.category)}</span>
                        <h3 class="blog-title">${escapeHtml(blog.title)}</h3>
                        <p class="blog-excerpt">${escapeHtml(blog.excerpt)}</p>
                        <div class="blog-meta">
                            <span class="blog-date">📅 ${formatDate(blog.created_at)}</span>
                            <span class="blog-read-time">⏱️ ${escapeHtml(blog.read_time || '5 min read')}</span>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        }
    </script>
</body>
</html>
