<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>Government Job Hai</h1>
            </div>
            <div class="nav-menu">
                <a href="../index.html" class="nav-link">Home</a>

                <a href="index.html" class="nav-link active">Blog</a>

            </div>
        </div>
    </nav>

    <div class="blog-container">
        <a href="index.html" class="back-link">
            ← Back to Blog
        </a>

        <div id="blogContent">
            <div class="loading">Loading blog post...</div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Government Job Hai. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="../js/firebase-config.js"></script>
    <script src="../js/adsense-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const blogId = urlParams.get('id');

            if (!blogId) {
                showError('Blog ID not found');
                return;
            }

            try {
                // Load blogs directly from JSON file (works on GitHub Pages)
                const response = await fetch('../blogs-data.json');
                if (!response.ok) throw new Error('Failed to load blogs');
                const blogs = await response.json();

                // Find the blog with the matching ID
                const blog = blogs.find(b => b.id == blogId);
                if (!blog) {
                    throw new Error('Blog not found');
                }

                renderBlogPost(blog);
            } catch (error) {
                console.error('Failed to load blog:', error);
                showError('Failed to load blog post. Please try again later.');
            }
        });

        function renderBlogPost(blog) {
            const container = document.getElementById('blogContent');
            document.getElementById('pageTitle').textContent = blog.title + ' - Government Job Hai';

            // Parse markdown content
            const contentHtml = parseMarkdown(blog.content);

            const shareUrl = encodeURIComponent(window.location.href);
            const shareTitle = encodeURIComponent(blog.title);

            container.innerHTML = `
                <article class="blog-post-header">
                    <div class="blog-meta-top">
                        <span class="blog-meta-badge">${escapeHtml(blog.category)}</span>
                        <span class="blog-meta-badge">📅 ${formatDate(blog.created_at)}</span>
                        <span class="blog-meta-badge">⏱️ ${escapeHtml(blog.read_time || '5 min read')}</span>
                    </div>

                    <h1 class="blog-post-title">${escapeHtml(blog.title)}</h1>
                    <p class="blog-post-excerpt">${escapeHtml(blog.excerpt)}</p>

                    <img src="${escapeHtml(blog.image)}" alt="${escapeHtml(blog.title)}" class="blog-post-image" onerror="this.src='https://via.placeholder.com/800x400?text=Blog+Image'">

                    <div class="blog-author">
                        <div class="author-info">
                            <div class="author-name">${escapeHtml(blog.author)}</div>
                            <div class="post-date">Published on ${formatDate(blog.created_at)}${blog.updated_at !== blog.created_at ? ' • Updated on ' + formatDate(blog.updated_at) : ''}</div>
                        </div>
                        <div class="share-buttons">
                            <a href="https://wa.me/?text=${shareTitle}%20${shareUrl}" target="_blank" class="share-btn whatsapp">WhatsApp</a>
                            <a href="https://t.me/share/url?url=${shareUrl}&text=${shareTitle}" target="_blank" class="share-btn telegram">Telegram</a>
                            <a href="https://www.facebook.com/sharer/sharer.php?u=${shareUrl}" target="_blank" class="share-btn facebook">Facebook</a>
                            <a href="https://twitter.com/intent/tweet?url=${shareUrl}&text=${shareTitle}" target="_blank" class="share-btn twitter">Twitter</a>
                        </div>
                    </div>
                </article>

                <div class="blog-content">
                    ${contentHtml}
                </div>
            `;
        }

        function parseMarkdown(content) {
            if (!content) return '';

            // Simple markdown parser
            let html = content
                // Headers
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                // Bold
                .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
                // Italic
                .replace(/\*(.*?)\*/gim, '<em>$1</em>')
                // Links
                .replace(/\[([^\]]+)\]\(([^\)]+)\)/gim, '<a href="$2" target="_blank">$1</a>')
                // Line breaks
                .replace(/\n\n/gim, '</p><p>')
                .replace(/\n/gim, '<br>');

            return '<p>' + html + '</p>';
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function showError(message) {
            document.getElementById('blogContent').innerHTML = `
                <div class="error">
                    <p style="font-size: 1.125rem;">❌ ${message}</p>
                    <a href="index.html" class="back-link" style="margin-top: 1rem;">← Back to Blog</a>
                </div>
            `;
        }
    </script>
