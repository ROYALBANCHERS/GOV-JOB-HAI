<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admit Cards - Government Job Hai</title>
    <meta name="description" content="Download admit cards for government exams and recruitment tests.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>Government Job Hai</h1>
                <span class="nav-tagline">Latest Government Jobs</span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="latest_job.html" class="nav-link">Latest Jobs</a>
                <a href="admit_card.html" class="nav-link active">Admit Cards</a>
                <a href="result.html" class="nav-link">Results</a>
                <div class="nav-divider"></div>
                <a href="../login.html" class="nav-link" id="loginLink">Login</a>
                <a href="../admin.html" class="nav-link hidden" id="adminLink">Admin</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <section class="category-header">
                <h1>Admit Cards</h1>
                <p>Download admit cards for upcoming government examinations</p>
            </section>

            <section class="search-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search admit cards..." class="search-input">
                </div>
            </section>

            <section class="jobs-section">
                <div class="jobs-list" id="jobsList">
                    <div class="loading">Loading...</div>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Government Job Hai. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const jobsList = document.getElementById('jobsList');
            const searchInput = document.getElementById('searchInput');
            let allJobs = [];

            async function loadJobs() {
                try {
                    allJobs = await api.getJobs({ category: 'admit_card' });
                    displayJobs(allJobs);
                } catch (error) {
                    jobsList.innerHTML = '<div class="error">Failed to load admit cards.</div>';
                }
            }

            function displayJobs(jobs) {
                if (jobs.length === 0) {
                    jobsList.innerHTML = '<div class="no-results">No admit cards found.</div>';
                    return;
                }
                jobsList.innerHTML = jobs.map(job => `
                    <div class="job-card">
                        <div class="job-header">
                            <span class="job-badge badge-green">Admit Card</span>
                            <h3><a href="../job.html?id=${job.id}">${escapeHtml(job.title)}</a></h3>
                            <p>${formatDate(job.created_at)}</p>
                        </div>
                        <p>${escapeHtml(job.short_info || '')}</p>
                        <a href="../job.html?id=${job.id}" class="job-link">Download Admit Card →</a>
                    </div>
                `).join('');
            }

            searchInput.addEventListener('input', () => {
                const term = searchInput.value.toLowerCase();
                const filtered = allJobs.filter(j => j.title.toLowerCase().includes(term));
                displayJobs(filtered);
            });

            await loadJobs();
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            return new Date(dateString).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        }
    </script>
</body>
</html>
