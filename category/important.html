<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Important Updates - Government Job Hai</title>
    <meta name="description" content="Important updates and notifications for government jobs.">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>Government Job Hai</h1>
            </div>
            <div class="nav-menu">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="important.html" class="nav-link active">Important</a>
            </div>
        </div>
    </nav>
    <main class="main-content">
        <div class="container">
            <h1>Important Updates</h1>
            <div id="jobsList"><div class="loading">Loading...</div></div>
        </div>
    </main>
    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const jobs = await api.getJobs();
                document.getElementById('jobsList').innerHTML = jobs.length ? jobs.map(j => `<div class="job-card"><h3><a href="../job.html?id=${j.id}">${j.title}</a></h3><p>${j.short_info || ''}</p></div>`).join('') : '<p>No updates found.</p>';
            } catch (e) {
                document.getElementById('jobsList').innerHTML = '<p>Failed to load.</p>';
            }
        });
    </script>
</body>
</html>
