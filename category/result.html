<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results - Government Job Hai</title>
    <meta name="description" content="Check government exam results and merit lists.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>Government Job Hai</h1>
                <span class="nav-tagline">Latest Government Jobs</span>
            </div>
            <div class="nav-menu">
                <a href="../index.html" class="nav-link">Home</a>
                <a href="latest_job.html" class="nav-link">Latest Jobs</a>
                <a href="admit_card.html" class="nav-link">Admit Cards</a>
                <a href="result.html" class="nav-link active">Results</a>
                <div class="nav-divider"></div>
                <a href="../login.html" class="nav-link" id="loginLink">Login</a>
                <a href="../admin.html" class="nav-link hidden" id="adminLink">Admin</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <section class="category-header">
                <h1>Exam Results</h1>
                <p>Check latest government examination results and merit lists</p>
            </section>

            <section class="jobs-section">
                <div class="jobs-list" id="jobsList">
                    <div class="loading">Loading...</div>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Government Job Hai. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const jobs = await api.getJobs({ category: 'result' });
                const jobsList = document.getElementById('jobsList');

                if (jobs.length === 0) {
                    jobsList.innerHTML = '<div class="no-results">No results found.</div>';
                    return;
                }

                jobsList.innerHTML = jobs.map(job => `
                    <div class="job-card">
                        <div class="job-header">
                            <span class="job-badge badge-red">Result</span>
                            <h3><a href="../job.html?id=${job.id}">${escapeHtml(job.title)}</a></h3>
                        </div>
                        <p>${escapeHtml(job.short_info || '')}</p>
                        <a href="../job.html?id=${job.id}" class="job-link">View Result →</a>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('jobsList').innerHTML = '<div class="error">Failed to load results.</div>';
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
